<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>⑰操作練習チェックリスト｜MATTY使い方ガイド</title>
<link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
<div class="top-bar">
  <div class="top-bar-inner">
    <span class="brand">🍞 MATTY 使い方ガイド</span>
    <a class="home-link" href="../index.html">目次へ</a>
  </div>
</div>
<div class="wrap">
  <div class="page-head">
    <span class="page-badge">⑰</span>
    <h1>操作練習チェックリスト</h1>
    <p class="lead">できたものからチェックを入れていきましょう。全部つけば基本はバッチリです。</p>
  </div>

  <div class="note">
    練習は、必ずテスト用のお客様（例：テストさん・テス子さん）で行ってください。実際のお客様のデータには影響しないよう気をつけましょう。
  </div>

  <div class="card">
    <div class="check-item">
      <input type="checkbox" id="c1"><label for="c1">初めてのお客様を来店登録できた</label>
    </div>
    <div class="check-item">
      <input type="checkbox" id="c2"><label for="c2">登録済みのお客様の来店を登録できた</label>
    </div>
    <div class="check-item">
      <input type="checkbox" id="c3"><label for="c3">検索でお客様を探せた</label>
    </div>
    <div class="check-item">
      <input type="checkbox" id="c4"><label for="c4">カレンダーで目的の月に移動できた</label>
    </div>
    <div class="check-item">
      <input type="checkbox" id="c5"><label for="c5">来店登録後にボトルを追加できた</label>
    </div>
    <div class="check-item">
      <input type="checkbox" id="c5b"><label for="c5b">シャンパンを追加できた</label>
    </div>
    <div class="check-item">
      <input type="checkbox" id="c6"><label for="c6">ボトルの状態を変更できた</label>
    </div>
    <div class="check-item">
      <input type="checkbox" id="c7"><label for="c7">来店記録を修正できた</label>
    </div>
    <div class="check-item">
      <input type="checkbox" id="c8"><label for="c8">来店を無効化できた</label>
    </div>
    <div class="check-item">
      <input type="checkbox" id="c9"><label for="c9">スタッフの休みを登録できた</label>
    </div>
  </div>

  <div class="note">チェックはこの端末に保存されます（アプリの操作には関係ありません）。</div>

  <div class="pager">
    <a class="secondary" href="16-help.html">← 前へ</a>
    <a href="18-event.html">次へ：おまけ・イベント登録 →</a>
  </div>
</div>
<script src="../assets/js/main.js"></script>
</body>
</html>
